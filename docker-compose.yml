services:
  # ---- PostgreSQL 16 with PostGIS ----
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-percurso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-percurso_password}
      POSTGRES_DB: ${POSTGRES_DB:-percurso_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-percurso} -d ${POSTGRES_DB:-percurso_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- FastAPI Backend ----
  backend:
    build:
      context: ./backend
      target: production
    environment:
      DATABASE_URL: ${INTERNAL_DATABASE_URL:-postgresql+asyncpg://percurso:percurso_password@postgres:5432/percurso_db}
      DATABASE_SYNC_URL: ${INTERNAL_DATABASE_SYNC_URL:-postgresql+psycopg2://percurso:percurso_password@postgres:5432/percurso_db}
      REDIS_URL: ${INTERNAL_REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${INTERNAL_CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${INTERNAL_CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-percurso-media}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      NOMINATIM_BASE_URL: ${NOMINATIM_BASE_URL:-https://nominatim.openstreetmap.org}
      OSM_USER_AGENT_EMAIL: ${OSM_USER_AGENT_EMAIL:-dev@example.com}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    develop:
      watch:
        - action: sync+restart
          path: ./backend/app
          target: /app/app

  # ---- Celery Worker ----
  celery-worker:
    build:
      context: ./backend
      target: production
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: ${INTERNAL_DATABASE_URL:-postgresql+asyncpg://percurso:percurso_password@postgres:5432/percurso_db}
      REDIS_URL: ${INTERNAL_REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${INTERNAL_CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${INTERNAL_CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-percurso-media}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Vite Dev Server (development only) ----
  frontend:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: ""
      VITE_MAP_STYLE_LIGHT: ${VITE_MAP_STYLE_LIGHT:-https://tiles.openfreemap.org/styles/liberty}
      VITE_MAP_STYLE_DARK: ${VITE_MAP_STYLE_DARK:-https://tiles.openfreemap.org/styles/dark}
      VITE_MAP_STYLE_MINIMAL: ${VITE_MAP_STYLE_MINIMAL:-https://tiles.openfreemap.org/styles/positron}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
